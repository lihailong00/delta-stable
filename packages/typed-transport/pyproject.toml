[build-system]
requires = []
build-backend = "build_backend"
backend-path = ["."]

[project]
name = "typed-transport"
version = "0.1.0"
description = "Typed async HTTP and WebSocket transport wrappers built on top of httpx and websockets."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.10.0",
    "websockets>=14.0",
]
keywords = ["async", "httpx", "websockets", "transport", "typed"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/longcoding/typed-transport"
Source = "https://github.com/longcoding/typed-transport"
Issues = "https://github.com/longcoding/typed-transport/issues"

[dependency-groups]
dev = [
    "mypy>=1.13.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
pretty = true
show_error_codes = true
warn_return_any = true
disallow_any_generics = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
strict_equality = true
